<!doctype html>
<html>
  <head>
    <title>ESP32 OLED Drawing Pad</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>ESP32 OLED Drawing Pad</h1>

    <div class="toolbar">
      <button id="brushBtn">Brush</button>
      <button id="eraserBtn">Eraser</button>
    </div>
    <div class="brush-size">
      <button id="size1Btn">1</button>
      <button id="size2Btn">2</button>
      <button id="size3Btn">3</button>
    </div>

    <button id="clearButton">Clear</button>

    <canvas id="drawingCanvas" width="512" height="256"></canvas>

    <script src="app.js"></script>
  </body>
</html>
